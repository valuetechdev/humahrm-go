overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Huma's API overlay
  version: 1.0.0
actions:
  - target: "$.openapi"
    update: "3.0.3"

  - target: "$.paths['/users/{userId}/positions']"
    description: Alter operationId
    update:
      get:
        operationId: "listUserPositions"
      post:
        operationId: "createUserPositions"

  - target: "$.paths['/users']"
    description: Alter operationId
    update:
      get:
        operationId: "listUsers"
      post:
        operationId: "createUser"

  - target: "$.paths['/users/{id}/groups']"
    description: Alter operationId
    update:
      post:
        operationId: "addUserToGroups"
      delete:
        operationId: "removeUserFromGroups"

  - target: "$.paths['/job-titles']"
    description: Alter operationId
    update:
      get:
        operationId: "listJobTitles"
      post:
        operationId: "addJobTitle"

  - target: "$.paths['/job-titles/{id}']"
    description: Alter operationId
    update:
      get:
        operationId: "getJobTitle"
      patch:
        operationId: "updateJobTitle"

  - target: "$.paths['/groups']"
    description: Alter operationId
    update:
      get:
        operationId: "listGroups"
      post:
        operationId: "addGroup"

  - target: "$.paths['/groups/{id}']"
    description: Alter operationId
    update:
      get:
        operationId: "getGroup"
      patch:
        operationId: "updateGroup"

  - target: "$.paths['/users/{id}']"
    description: Alter operationId
    update:
      get:
        operationId: "getUser"
      patch:
        operationId: "updateUser"
